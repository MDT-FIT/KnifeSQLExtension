<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            font-family: monospace;
            font-size: 13px;
            margin: 8px;
            background: #1e1e1e;
            color: #d4d4d4;
            overflow: auto;
        }

        h3 {
            color: #9cdcfe;
            margin: 4px 0 8px 0;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        th {
            background: #2d2d2d;
            color: #9cdcfe;
            padding: 4px 8px;
            text-align: left;
            border: 1px solid #444;
            position: sticky;
            top: 0;
            z-index: 1;
        }

        td {
            padding: 4px 8px;
            border: 1px solid #333;
        }

        tr:nth-child(even) td {
            background: #252525;
        }
    </style>
</head>
<body>
    <div id="root">Loading...</div>
    <script>
async function load(){
  try{
    const r=await fetch('/api/snapshot');
    const d=await r.json();
    if(!d.columns){document.getElementById('root').innerHTML='(no data)';return;}
    let html='<h3>Snapshot (before)</h3><table><tr>';
    d.columns.forEach(c=>html+=`<th>${c}</th>`);
    html+='</tr>';
    d.rows.forEach(row=>{
      html+='<tr>';
      row.forEach(cell=>html+=`<td>${cell}</td>`);
      html+='</tr>';
    });
    html+='</table>';
    document.getElementById('root').innerHTML=html;
  }catch(e){
    document.getElementById('root').innerHTML='<div style="color:#f44747">Error: '+e.message+'</div>';
  }
}
load();setInterval(load,2000);
    </script>
</body>
</html>
