<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            font-family: monospace;
            font-size: 13px;
            margin: 8px;
            background: #1e1e1e;
            color: #d4d4d4;
            overflow: auto;
        }

        h3 {
            color: #9cdcfe;
            margin: 4px 0 8px 0;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        th {
            background: #2d2d2d;
            color: #9cdcfe;
            padding: 4px 8px;
            text-align: left;
            border: 1px solid #444;
            position: sticky;
            top: 0;
            z-index: 1;
        }

        td {
            padding: 4px 8px;
            border: 1px solid #333;
        }

        tr:nth-child(even) td {
            background: #252525;
        }

        .added td {
            background: #1a3a1a !important;
            color: #4ec94e;
        }

        .deleted td {
            background: #3a1a1a !important;
            color: #f44747;
        }

        .cell-modified {
            background: #3a3000 !important;
            color: #dcdcaa;
        }
    </style>
</head>
<body>
    <div id="root">Loading...</div>
    <script>
async function load(){
  try{
    const r=await fetch('/api/current');
    const d=await r.json();
    if(!d.columns){document.getElementById('root').innerHTML='(no data)';return;}
    const diffSet={};
    (d.diffs||[]).forEach(x=>{
      if(!diffSet[x.RowIndex])diffSet[x.RowIndex]={};
      diffSet[x.RowIndex][x.ColumnName]=x.DiffType;
    });
    let html='<h3>Current (after)</h3><table><tr>';
    d.columns.forEach(c=>html+=`<th>${c}</th>`);
    html+='</tr>';
    d.rows.forEach((row,ri)=>{
      const rd=diffSet[ri]||{};
      const isAdded=rd['*']===2,isDeleted=rd['*']===1;
      const rc=isAdded?'added':isDeleted?'deleted':'';
      html+=`<tr class="${rc}">`;
      row.forEach((cell,ci)=>{
        const col=d.columns[ci];
        const mod=!isAdded&&!isDeleted&&rd[col]===0;
        html+=`<td class="${mod?'cell-modified':''}">${cell}</td>`;
      });
      html+='</tr>';
    });
    html+='</table>';
    document.getElementById('root').innerHTML=html;
  }catch(e){
    document.getElementById('root').innerHTML='<div style="color:#f44747">Error: '+e.message+'</div>';
  }
}
load();setInterval(load,2000);
    </script>
</body>
</html>
